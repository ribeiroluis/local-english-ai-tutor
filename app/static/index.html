<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English AI Tutor</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div id="welcome-screen">
    <header class="welcome-header">
      <h1>English AI Tutor</h1>
      <p class="subtitle">Practice spoken English with AI</p>
    </header>

    <section class="topic-section">
      <h2>Choose a topic</h2>
      <div id="topic-grid" class="topic-grid">
        <div class="topic-card is-loading" data-topic-id="">
          <div class="card-skeleton"></div>
        </div>
        <div class="topic-card is-loading" data-topic-id="">
          <div class="card-skeleton"></div>
        </div>
        <div class="topic-card is-loading" data-topic-id="">
          <div class="card-skeleton"></div>
        </div>
        <div class="topic-card is-loading" data-topic-id="">
          <div class="card-skeleton"></div>
        </div>
        <div class="topic-card is-loading" data-topic-id="">
          <div class="card-skeleton"></div>
        </div>
      </div>
    </section>

    <section class="level-section">
      <h2>Your level</h2>
      <div id="level-selector" class="level-selector">
        <button class="level-btn" data-level="A1">A1</button>
        <button class="level-btn" data-level="A2">A2</button>
        <button class="level-btn" data-level="B1">B1</button>
        <button class="level-btn" data-level="B2">B2</button>
        <button class="level-btn" data-level="C1">C1</button>
        <button class="level-btn" data-level="C2">C2</button>
      </div>
    </section>

    <button id="start-btn" class="start-btn" disabled>Start Conversation</button>
  </div>

  <div id="chat-screen" class="hidden">
    <header class="chat-header">
      <span id="chat-topic-label" class="chat-topic"></span>
      <span id="chat-level-label" class="chat-level"></span>
      <button id="end-session-btn" class="end-session-btn">End Session</button>
    </header>

    <div id="circle-container" class="circle-container">
      <div id="circle-indicator" class="circle-indicator idle"></div>
      <p id="circle-label" class="circle-label">Tap mic to start</p>
    </div>

    <div class="chat-input-bar">
      <button id="record-btn" class="record-btn" title="Tap to record">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="review-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h2>Session Review</h2>
      <div id="corrections-list" class="corrections-list"></div>
      <button id="new-conversation-btn" class="start-btn">New Conversation</button>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
