name: PR Agent
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, review_requested]

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    steps:
      - name: PR Agent action step
        uses: the-pr-agent/pr-agent@v0.38.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CONFIG.AI_PROVIDER: "litellm"
          CONFIG.MODEL: "gemini/gemini-2.5-flash"
          CONFIG.MODEL_WEAK: "gemini/gemini-2.5-flash"
          CONFIG.FALLBACK_MODELS: "['gemini/gemini-2.5-pro']"
          CONFIG.LITELLM.DROP_PARAMS: "true"
          CONFIG.LITELLM.NUM_RETRIES: "3"
          CONFIG.LITELLM.TIMEOUT: "120"
          CONFIG.GITHUB_ACTION_CONFIG.AUTO_REVIEW: "true"
          CONFIG.GITHUB_ACTION_CONFIG.AUTO_DESCRIBE: "true"
          CONFIG.GITHUB_ACTION_CONFIG.PR_ACTIONS: "['opened', 'synchronize', 'reopened', 'ready_for_review', 'review_requested']"